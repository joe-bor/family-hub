services:
  api:
    build: ./backend/family-hub-api
    ports:
      - "8080:8080"
    environment:
      - JWT_SECRET=${JWT_SECRET:-dGVzdC1zZWNyZXQta2V5LXRoYXQtaXMtbG9uZy1lbm91Z2gtZm9yLWhtYWMtc2hhLTI1Ng==}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s
